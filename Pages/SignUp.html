<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../Css/SignUp.css">
  <title>Login Page</title>
</head>
<body>
  <div class="login">
    <div class="logo">
      <img src="../images/img1.png" alt="">
    </div>

    <div class="box-p">
       <h2>Sign up to get started</h2>
      <p>Get personalised picks & faster checkout</p>
    </div>

    <div class="input-box">
      <label for="number"></label>
      <input type="number" placeholder="+91 Enter 10-digit mobile number" id="number" name="number">
      <br>
      <button>Get OTP</button>
      <p>By entering this site, you agree to the <br> <span>Terms & Conditions</span> and <span>Privacy Policy</span>.</p>
    </div>
  </div>
</body>
</html>
